name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; queued runs wait rather than overlap.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx ng build --configuration production

      # GitHub Pages has no server-side rewrite for a path-based SPA router — it serves 404.html
      # for any unmatched path, so a direct link to e.g. /nostr/fight/... or a hard refresh needs
      # this to resolve to the same app shell Angular's router then takes over from client-side.
      - run: cp dist/browser/index.html dist/browser/404.html

      # Custom domain (repo Settings > Pages > Custom domain). The Actions-based deploy needs the
      # CNAME file inside the uploaded artifact on every run — it isn't preserved automatically.
      - run: echo "timeline.xivoid.app" > dist/browser/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
